name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # required for OIDC trusted publishing

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm check-types

      - name: Test
        run: pnpm test

      - name: Strip auth token to enable OIDC trusted publishing
        run: grep -v '_authToken' "$NPM_CONFIG_USERCONFIG" > /tmp/.npmrc.clean && cp /tmp/.npmrc.clean "$NPM_CONFIG_USERCONFIG"

      - name: Publish
        run: npm publish --provenance --access public
